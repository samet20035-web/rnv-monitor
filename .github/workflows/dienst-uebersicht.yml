name: RNV Dienst-Übersicht

on:
  workflow_dispatch:
  # Automatisch wenn monitor.py checkpoint.json aktualisiert
  push:
    paths:
      - "checkpoint.json"

jobs:
  uebersicht:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Dienst-Übersicht
        env:
          RNV_USER:   ${{ secrets.RNV_USER }}
          RNV_PASS:   ${{ secrets.RNV_PASS }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python dienst_uebersicht.py

      - name: Commit Übersicht-Dateien
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Ganzen dienste/-Ordner hinzufügen
          if [ -d "dienste" ] && [ "$(ls -A dienste)" ]; then
            git add dienste/
            if ! git diff --cached --quiet; then
              git commit -m "Update Dienst-Übersicht"
              git push
            else
              echo "Keine Änderungen in dienste/."
            fi
          else
            echo "Ordner dienste/ ist leer oder existiert nicht."
          fi
