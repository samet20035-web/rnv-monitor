name: RNV Dienstplan Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        run: python monitor.py
        env:
          RNV_LOGIN_URL: ${{ secrets.RNV_LOGIN_URL }}
          RNV_ROSTER_URL: ${{ secrets.RNV_ROSTER_URL }}
          RNV_USER: ${{ secrets.RNV_USER }}
          RNV_PASS: ${{ secrets.RNV_PASS }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          RNV_USER_FIELD: ${{ secrets.RNV_USER_FIELD }}
          RNV_PASS_FIELD: ${{ secrets.RNV_PASS_FIELD }}
          RNV_SUBMIT_FIELD: ${{ secrets.RNV_SUBMIT_FIELD }}
          RNV_SUBMIT_VALUE: ${{ secrets.RNV_SUBMIT_VALUE }}

      - name: Commit updated state
        run: |
          if git diff --quiet -- state/last_hash.txt; then
            echo "No state change."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/last_hash.txt
            git commit -m "Update RNV state"
            git push
          fi
