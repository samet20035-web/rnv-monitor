name: RNV Dienstplan Monitor

on:
  workflow_dispatch:
  schedule:
    # 08:00 bis 17:59 Uhr alle 15 Minuten
    - cron: "*/15 6-17 * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Sync remote
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Run monitor
        env:
          RNV_USER: ${{ secrets.RNV_USER }}
          RNV_PASS: ${{ secrets.RNV_PASS }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOPIC_MAMA: ${{ secrets.NTFY_TOPIC_MAMA }}
        run: |
          python monitor.py

      - name: Commit changes
        run: |
          FILES_TO_ADD=""
          if [ -f "checkpoint.json" ]; then FILES_TO_ADD="$FILES_TO_ADD checkpoint.json"; fi
          if [ -f "dienstplan.ics" ]; then FILES_TO_ADD="$FILES_TO_ADD dienstplan.ics"; fi

          if [ -n "$FILES_TO_ADD" ]; then
            git add $FILES_TO_ADD
            if ! git diff --cached --quiet; then
              git commit -m "Update Dienstplan und Checkpoint"
              git push
            else
              echo "Keine Änderungen zum Committen gefunden."
            fi
          else
            echo "Keine Dateien (checkpoint.json oder dienstplan.ics) zum Committen vorhanden."
          fi
