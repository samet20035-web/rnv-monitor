name: RNV Dienstplan Monitor

on:
  workflow_dispatch:
  schedule:
    # 07:00 bis 19:59 Uhr alle 15 Minuten
    - cron: "*/15 7-19 * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          RNV_USER: ${{ secrets.RNV_USER }}
          RNV_PASS: ${{ secrets.RNV_PASS }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python monitor.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Prüfe erst, ob die Datei existiert, bevor wir adden
          if [ -f checkpoint.json ]; then
            git add checkpoint.json
            git commit -m "Update checkpoint" || echo "Keine Änderungen zu committen"
            git push
          else
            echo "checkpoint.json existiert nicht, überspringe Commit."
          fi
