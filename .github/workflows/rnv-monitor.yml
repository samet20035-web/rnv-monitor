name: RNV Dienstplan Monitor

on:
  workflow_dispatch:
  schedule:
    # 07:00 bis 19:59 Uhr alle 15 Minuten
    - cron: "*/15 7-19 * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

- name: Run monitor
        env:
          RNV_USER: ${{ secrets.RNV_USER }}
          RNV_PASS: ${{ secrets.RNV_PASS }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python monitor.py
          
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Nur adden, wenn die Datei existiert
          if [ -f "checkpoint.json" ]; then
            git add checkpoint.json
            # Nur committen, wenn sich der Inhalt wirklich geändert hat
            if ! git diff --quiet --cached; then
              git commit -m "Update RNV Dienstplan"
              git push
            fi
          fi
