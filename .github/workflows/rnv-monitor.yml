name: RNV Dienstplan Monitor

on:
  workflow_dispatch:
  schedule:
    # 07:00 bis 19:59 Uhr alle 15 Minuten
    - cron: "*/15 7-19 * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          RNV_USER: ${{ secrets.RNV_USER }}
          RNV_PASS: ${{ secrets.RNV_PASS }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python monitor.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Wir fügen sowohl die checkpoint.json als auch die dienstplan.ics hinzu
          # Wir prüfen, ob mindestens eine der Dateien existiert, um Fehler zu vermeiden
          if [ -f checkpoint.json ] || [ -f dienstplan.ics ]; then
            git add checkpoint.json dienstplan.ics
            # git diff --cached prüft, ob wirklich Änderungen im Staging-Bereich sind
            if ! git diff --cached --quiet; then
              git commit -m "Update Dienstplan und Checkpoint"
              git push
            else
              echo "Keine Änderungen zum Committen gefunden."
            fi
          else
            echo "Keine Dateien (checkpoint.json oder dienstplan.ics) zum Committen vorhanden."
          fi
