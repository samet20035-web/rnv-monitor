name: iOS Calendar Notification

on:
  workflow_dispatch:

jobs:
  ios:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run iOS payload test
      - name: Run iOS payload test
  run: |
    python << 'EOF'
from integrations.ios.push_builder import build_ios_push
from datetime import datetime, timedelta

event = {
    "summary": "RNV Test Verspätung",
    "start": datetime.utcnow(),
    "end": datetime.utcnow() + timedelta(minutes=30),
    "description": "Test Event"
}

print(build_ios_push(event))
EOF
